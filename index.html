<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Figtree:300,regular,500,600,700,800,900,300italic,italic,500italic,600italic,700italic,800italic,900italic"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Blog preview card</title>
  </head>
  <body>
    <div class="container">
      <img
        src="assets/images/illustration-article.svg"
        alt="illustration-article"
        class="container__image"
      />
      <div class="container__content">
        <span class="status">Learning</span>
        <p class="publish-date">Published 21 Dec 2023</p>
        <h1 class="container__title">HTML & CSS foundations</h1>
        <p class="container__description">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div class="flex-group">
        <img
          src="assets/images/image-avatar.webp"
          alt="avatar"
          class="flex-group__image"
        />
        <p class="author">Greg Hooper</p>
      </div>
    </div>
  </body>
</html>
